<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VPN File Drop</title>
</head>
<body>
  <h1>VPN File Drop</h1>
  <p><a href="/">Back to devices</a></p>
  <h2>Files</h2>
  <p>Free disk space: {{.FreeDiskSpaceBytes}} GB</p>
  <ul>
    {{range .Files}}
    <li><a href="/download-file/{{.}}">{{.}}</a> <a href="/delete-file/{{.}}"><button type="button">Delete</button></a></li>
    {{end}}
  </ul>
  <input type="file" id="fileInput" data-max-bytes="{{.FreeDiskSpaceBytes}}">
  <button type="button" id="uploadFile">Upload file</button>
  <progress id="uploadProgress" value="0" max="100" style="display:none;"></progress>
  <script>
    document.getElementById("uploadFile").addEventListener("click", function() {
      const fileInput = document.getElementById("fileInput");
      const uploadProgress = document.getElementById("uploadProgress");
      uploadProgress.style.display = "block";
      uploadProgress.value = 0;

      const formData = new FormData();
      formData.append("file", fileInput.files[0]);

      const xhr = new XMLHttpRequest();
      xhr.open("POST", "/upload-file");

      xhr.upload.addEventListener("progress", function(event) {
        if (!event.lengthComputable) {
          return;
        }
        uploadProgress.value = Math.round((event.loaded / event.total) * 100);
      });

      xhr.addEventListener("load", function() {
        window.location.reload();
      });

      xhr.addEventListener("error", function() {
        alert("Upload failed");
      });

      xhr.send(formData);
    });
  </script>
</body>
</html>
